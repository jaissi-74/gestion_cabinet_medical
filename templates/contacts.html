{% extends 'base.html' %}
{% block content %}
<div class="top-actions">
  <h1>Liste des contacts</h1>
  <a class="btn" href="{{ url_for('add_contact') }}">Ajouter un contact</a>
</div>
<form class="search" method="get">
  <input name="q" placeholder="Rechercher..." value="{{ q }}">
  <button>Rechercher</button>
</form>
<table>
  <thead><tr><th>ID</th><th>Nom</th><th>Email</th><th>Téléphone</th><th>Catégorie</th><th>Actions</th></tr></thead>
  <tbody>
    {% for c in contacts %}
    <tr>
      <td>{{ c[0] }}</td><td>{{ c[1] }}</td><td>{{ c[2] }}</td><td>{{ c[3] }}</td><td>{{ c[4] }}</td>
      <td><a href="{{ url_for('edit_contact', id=c[0]) }}">Modifier</a> | <a href="{{ url_for('delete_contact', id=c[0]) }}" onclick="return confirm('Supprimer ?')">Supprimer</a></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
