{% extends 'base.html' %}
{% block title %}{{ 'Modifier' if contact else 'Ajouter' }} un contact{% endblock %}
{% block content %}
<section class="page-header">
  <div>
    <h1>{{ 'Modifier' if contact else 'Ajouter' }} un contact</h1>
    <p>Remplissez les informations du contact comme dans l'application Tkinter.</p>
  </div>
  <a class="btn secondary" href="{{ url_for('contacts') }}">← Retour</a>
</section>

<form class="card form-grid" method="post">
  <div class="field">
    <label>Nom *</label>
    <input name="name" placeholder="Nom complet" value="{{ contact[1] if contact else '' }}" required>
  </div>

  <div class="field">
    <label>Email *</label>
    <input type="email" name="email" placeholder="exemple@email.com" value="{{ contact[2] if contact else '' }}" required>
  </div>

  <div class="field">
    <label>Téléphone *</label>
    <input name="phone" placeholder="06XXXXXXXX" value="{{ contact[3] if contact else '' }}" required>
  </div>

  <div class="field">
    <label>Catégorie</label>
    <select name="category">
      {% set selected = contact[4] if contact else 'General' %}
      {% for cat in ['General', 'Patient', 'Fournisseur', 'Laboratoire', 'Client', 'Collègue'] %}
        <option value="{{ cat }}" {% if selected == cat %}selected{% endif %}>{{ cat }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="field full-width">
    <label>Adresse</label>
    <input name="adress" placeholder="Adresse du contact" value="{{ contact[5] if contact else '' }}">
  </div>

  <div class="field full-width">
    <label>Entreprise</label>
    <input name="company" placeholder="Entreprise / Cabinet / Laboratoire" value="{{ contact[6] if contact else '' }}">
  </div>

  <div class="form-actions full-width">
    <button type="submit" class="btn">Enregistrer</button>
    <a class="btn secondary" href="{{ url_for('contacts') }}">Annuler</a>
  </div>
</form>
{% endblock %}
